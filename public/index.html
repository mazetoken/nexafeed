<!DOCTYPE html>

<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="NEXA Block Feed Visualization">
  <meta name="web" content="https://nexafeed.nota.deno.net">
  <meta property="og:title" content="NEXA Block Feed">
  <meta property="og:description" content="NEXA Block Feed Visualization">
  <title>NEXA Block Feed</title>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #000;
      --surface: #0d0d0d;
      --border: #2a2a2a;
      --dim: #555;
      --muted: #888;
      --text: #e0e0e0;
      --bright: #fff;
      --accent: #00e5ff;
      --accent2: #ff6b00;
      --mono: ui-monospace, 'Cascadia Code', 'SF Mono', Menlo, Consolas, monospace;
      --ui: system-ui, -apple-system, 'Segoe UI', sans-serif;
    }

    html,
    body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--mono);
      font-size: 15px;
      line-height: 1.6;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(0deg, transparent, transparent 2px,
          rgba(0, 0, 0, 0.06) 2px, rgba(0, 0, 0, 0.06) 4px);
      pointer-events: none;
      z-index: 9999;
    }

    .shell {
      max-width: 960px;
      margin: 0 auto;
      padding: 0 24px;
    }

    /* ── HEADER ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 24px 0 18px;
      border-bottom: 1px solid var(--border);
    }

    .logo {
      font-family: var(--ui);
      font-size: 24px;
      font-weight: 800;
      letter-spacing: -0.02em;
      color: var(--bright);
    }

    .logo span {
      color: var(--accent);
    }

    .status-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: var(--muted);
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .dot-wrap {
      position: relative;
      width: 7px;
      height: 7px;
    }

    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--muted);
      transition: background 0.3s;
    }

    .dot.live {
      background: var(--accent);
      box-shadow: 0 0 6px var(--accent);
    }

    .dot.error {
      background: var(--accent2);
      box-shadow: 0 0 6px var(--accent2);
    }

    .dot-wrap .ring {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 1px solid var(--accent);
      animation: pulse-ring 1.8s ease-out infinite;
      opacity: 0;
    }

    @keyframes pulse-ring {
      0% {
        transform: scale(0.8);
        opacity: 0.8;
      }

      100% {
        transform: scale(2.4);
        opacity: 0;
      }
    }

    /* ── TICKER ── */
    .ticker {
      position: relative;
      overflow: hidden;
      padding: 6px 0;
      border-bottom: 1px solid var(--border);
    }

    .ticker::before,
    .ticker::after {
      content: '';
      position: absolute;
      top: 0;
      bottom: 0;
      width: 40px;
      z-index: 2;
    }

    .ticker::before {
      left: 0;
      background: linear-gradient(90deg, var(--bg), transparent);
    }

    .ticker::after {
      right: 0;
      background: linear-gradient(-90deg, var(--bg), transparent);
    }

    .ticker-inner {
      display: flex;
      gap: 40px;
      white-space: nowrap;
      animation: scroll-ticker 30s linear infinite;
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .ticker-item {
      display: inline-flex;
      gap: 8px;
    }

    .ticker-item b {
      color: var(--text);
    }

    @keyframes scroll-ticker {
      from {
        transform: translateX(0);
      }

      to {
        transform: translateX(-50%);
      }
    }

    /* ── ROCKET LANE ── */
    .rocket-lane {
      position: relative;
      height: 58px;
      overflow: hidden;
      border-bottom: 1px solid var(--border);
    }

    .rocket {
      position: absolute;
      left: -36px;
      font-size: 20px;
      line-height: 1;
      user-select: none;
      animation: fly linear forwards;
      will-change: transform;
    }

    @keyframes fly {
      from {
        transform: translateX(0);
      }

      to {
        transform: translateX(calc(100vw + 72px));
      }
    }

    /* ── HERO STATS ── */
    .hero {
      display: grid;
      grid-template-columns: 1fr 1px 1fr 1px 1fr 1px 1fr;
      padding: 28px 0;
      border-bottom: 1px solid var(--border);
    }

    .divider-v {
      background: var(--border);
    }

    .stat {
      padding: 0 22px;
      opacity: 0;
      transform: translateY(6px);
      transition: opacity 0.4s, transform 0.4s;
    }

    .stat:first-child {
      padding-left: 0;
    }

    .stat:last-child {
      padding-right: 0;
    }

    .stat.visible {
      opacity: 1;
      transform: none;
    }

    .stat-label {
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .stat-value {
      font-family: var(--ui);
      font-size: 32px;
      font-weight: 700;
      color: var(--bright);
      letter-spacing: -0.02em;
      transition: color 0.15s;
      line-height: 1.1;
    }

    .stat-value.flash {
      color: var(--accent);
    }

    .stat-value.small {
      font-size: 20px;
      letter-spacing: 0;
    }

    .stat-sub {
      font-size: 11px;
      color: var(--muted);
      margin-top: 4px;
    }

    /* ── FOOTER ── */
    footer {
      padding: 14px 0 18px;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 11px;
      color: var(--dim);
      letter-spacing: 0.04em;
      margin-top: 40px;
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 640px) {
      .hero {
        grid-template-columns: 1fr 1fr;
        gap: 20px 0;
      }

      .divider-v {
        display: none;
      }

      .stat {
        padding: 0;
      }

      .stat-value {
        font-size: 26px;
      }

      .stat-value.small {
        font-size: 16px;
      }
    }
  </style>
</head>

<body>
  <div class="shell">

    <header>
      <div class="logo"><img src="./nexa-logo-mark.png" alt="Nexa" width="64"> NEXA<span> BLOCK </span>FEED</div>
      <div class="status-bar">
        <div class="dot-wrap" id="dotWrap">
          <div class="dot" id="dot"></div>
        </div>
        <span id="statusText">CONNECTING</span>
      </div>
    </header>

    <div class="ticker">
      <div class="ticker-inner">
        <span class="ticker-item"><b>NEXA</b> BLOCK FEED</span>
        <span class="ticker-item"><b>NETWORK</b> LIVE MONITOR</span>
        <span class="ticker-item"><b>AVG BLOCK</b> ~2 MIN</span>
        <span class="ticker-item"><b>ROSTRUM</b> ELECTRUM PROTOCOL</span>
        <span class="ticker-item"><b>NEXA</b> BLOCK FEED</span>
        <span class="ticker-item"><b>NETWORK</b> LIVE MONITOR</span>
        <span class="ticker-item"><b>AVG BLOCK</b> ~2 MIN</span>
        <span class="ticker-item"><b>ROSTRUM</b> ELECTRUM PROTOCOL</span>
      </div>
    </div>

    <div class="rocket-lane" id="rocketLane"></div>

    <main>
      <div class="hero">
        <div class="stat" id="statHeight">
          <div class="stat-label">Latest Block</div>
          <div class="stat-value" id="valHeight">—</div>
          <div class="stat-sub">height</div>
        </div>
        <div class="divider-v"></div>
        <div class="stat" id="statTx">
          <div class="stat-label">Transactions</div>
          <div class="stat-value" id="valTx">—</div>
          <div class="stat-sub">confirmed</div>
        </div>
        <div class="divider-v"></div>
        <div class="stat" id="statTime">
          <div class="stat-label">Block Time</div>
          <div class="stat-value" id="valTime">—</div>
          <div class="stat-sub" id="valTimeAgo"></div>
        </div>
        <div class="divider-v"></div>
        <div class="stat" id="statPrice">
          <div class="stat-label">NEXA / USD</div>
          <div class="stat-value small" id="valPrice">—</div>
          <div class="stat-sub" id="valPriceChange"></div>
        </div>
      </div>
    </main>

    <footer>
      <span>NEXA BLOCKCHAIN</span>
      <!-- <span id="footerTs"></span> -->
    </footer>

  </div>
  <script>
    // ── DOM ──
    const dot = document.getElementById('dot');
    const dotWrap = document.getElementById('dotWrap');
    const statusText = document.getElementById('statusText');
    const valHeight = document.getElementById('valHeight');
    const valTx = document.getElementById('valTx');
    const valTime = document.getElementById('valTime');
    const valTimeAgo = document.getElementById('valTimeAgo');
    const valPrice = document.getElementById('valPrice');
    const valPriceChange = document.getElementById('valPriceChange');
    const rocketLane = document.getElementById('rocketLane');
    //const footerTs = document.getElementById('footerTs');

    // stagger hero stats in
    ['statHeight', 'statTx', 'statTime', 'statPrice'].forEach((id, i) =>
      setTimeout(() => document.getElementById(id).classList.add('visible'), 80 + i * 110)
    );

    let lastBlockTs = null;

    // ── SSE ──
    const es = new EventSource('/stream');
    es.onopen = () => setStatus('live', 'LIVE');
    es.onerror = () => setStatus('error', 'DISCONNECTED');
    es.onmessage = (e) => {
      const block = JSON.parse(e.data);
      updateHero(block);
      //updateFooter();
      if (block.txCount) launchRockets(block.txCount);
    };

    // ── STATUS ──
    function setStatus(state, label) {
      dot.className = 'dot ' + state;
      statusText.textContent = label;
      if (state === 'live') {
        const ring = document.createElement('div');
        ring.className = 'ring';
        dotWrap.appendChild(ring);
        setTimeout(() => ring.remove(), 2000);
      }
    }

    // ── HERO ──
    function updateHero(block) {
      lastBlockTs = new Date(block.timestamp);
      flashValue(valHeight, fmt(block.height));
      flashValue(valTx, block.txCount != null ? fmt(block.txCount) : '—');
      valTime.textContent = lastBlockTs.toLocaleTimeString('en-US', { hour12: false });
      //valTime.textContent = lastBlockTs.toLocaleTimeString();
      valTimeAgo.textContent = timeAgo(lastBlockTs);
    }

    function flashValue(el, val) {
      el.textContent = val;
      el.classList.add('flash');
      setTimeout(() => el.classList.remove('flash'), 400);
    }

    // ── ROCKETS ──
    const MAX_ROCKETS = 100;
    const STAGGER_MS = 160;

    function launchRockets(txCount) {
      const count = Math.min(Math.max(txCount, 1), MAX_ROCKETS);
      const laneH = rocketLane.clientHeight;
      for (let i = 0; i < count; i++) {
        setTimeout(() => {
          const el = document.createElement('span');
          el.className = 'rocket';
          el.textContent = '🚀';
          el.style.top = `${5 + Math.random() * (laneH - 28)}px`;
          el.style.animationDuration = `${(6500 + Math.random() * 2000).toFixed(0)}ms`;
          rocketLane.appendChild(el);
          el.addEventListener('animationend', () => el.remove(), { once: true });
        }, i * STAGGER_MS);
      }
    }

    // ── PRICE ──
    const PRICE_URL = 'https://api.coingecko.com/api/v3/simple/price?ids=nexacoin&vs_currencies=usd&include_24hr_change=true';
    const PRICE_REFRESH_MS = 5 * 60 * 1000; // refresh every 5 min

    async function fetchPrice() {
      try {
        const res = await fetch(PRICE_URL);
        const data = await res.json();
        const usd = data?.nexacoin?.usd;
        const change = data?.nexacoin?.usd_24h_change;
        if (usd == null) return;


        valPrice.textContent = usd < 0.001
          ? `$${usd.toFixed(10)}`
          : `$${usd.toFixed(6)}`;

        if (change != null) {
          const sign = change >= 0 ? '+' : '';
          valPriceChange.textContent = `${sign}${change.toFixed(2)}% 24h`;
          valPriceChange.style.color = change >= 0 ? 'var(--accent)' : 'var(--accent2)';
        }
      } catch (e) {
        console.warn('Price fetch failed:', e.message);
      }

    }

    fetchPrice();
    setInterval(fetchPrice, PRICE_REFRESH_MS);

    // ── FOOTER ──
    //function updateFooter() {
    //footerTs.textContent = new Date().toISOString().replace('T', ' ').slice(0, 19) + ' UTC';
    //}

    // ── UTILS ──
    function fmt(n) { return Number(n).toLocaleString(); }

    function timeAgo(date) {
      const s = Math.floor((Date.now() - date) / 1000);
      if (s < 60) return `${s}s ago`;
      if (s < 3600) return `${Math.floor(s / 60)}m ago`;
      return `${Math.floor(s / 3600)}h ago`;
    }

    setInterval(() => {
      if (lastBlockTs) valTimeAgo.textContent = timeAgo(lastBlockTs);
    }, 15_000);
  </script>

</body>

</html>
